name: Semantic Release

on:
  workflow_call: # This makes the workflow reusable by other repos' workflows
    inputs:
      redeploy:
        description: 'Whether to redeploy the latest release'
        required: false
        type: boolean
        default: false
  # The following is when the expected final trigger would be called
  # push:
  #   branches: [ main ]
  # workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      issues: write
      pull-requests: write
    outputs:
      new-release-published: ${{ steps.release.outputs.new-release-published }}
      tag: ${{ steps.release.outputs.tag }}
    
    steps:
    - name: Checkout
      uses: actions/checkout@v7
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version-file: ".python-version"

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true

    - name: Install the project dependencies
      run: uv sync --locked --all-extras --dev

    - name: Python Semantic Release
      id: release
      uses: python-semantic-release/python-semantic-release@v10.5.3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
  
  docker:
    needs: release
    if: needs.release.outputs.new-release-published == 'true' || (github.event_name == 'workflow_call' && github.event.inputs.redeploy == true)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        ref: ${{ needs.release.outputs.tag || github.sha }}
    
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push Docker image (latest)
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        platforms: linux/amd64,linux/arm64
        tags: ghcr.io/${{ github.repository }}:latest

    - name: Build and push Docker image (tagged)
      if: needs.release.outputs.new-release-published == 'true'
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        platforms: linux/amd64,linux/arm64
        tags: ghcr.io/${{ github.repository }}:${{ needs.release.outputs.tag }}
